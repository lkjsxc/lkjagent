services:
  agent:
    build:
      context: .
      target: runtime
    command: ["run"]
    environment:
      LKJAGENT_API_KEY: ${LKJAGENT_API_KEY:-}
      LKJAGENT_ENDPOINT_URL: ${LKJAGENT_ENDPOINT_URL:-}
      LKJAGENT_ENDPOINT_TIMEOUT_SECONDS: ${LKJAGENT_ENDPOINT_TIMEOUT_SECONDS:-}
      LKJAGENT_MODEL: ${LKJAGENT_MODEL:-}
    volumes:
      - type: volume
        source: lkjagent-data
        target: /data

  verify:
    build:
      context: .
      target: build
    command: ["cargo", "run", "-p", "lkjagent-xtask", "--", "quiet", "verify"]

  endpoint-example:
    profiles: ["endpoint-example"]
    image: ghcr.io/ggerganov/llama.cpp:server
    command:
      - --host
      - 0.0.0.0
      - --port
      - "8080"
      - --model
      - /models/model.gguf
      - -c
      - ${LKJAGENT_CONTEXT_LENGTH:-32768}
    volumes:
      - type: bind
        source: ${LKJAGENT_MODEL_DIR:-./.lkjagent-models}
        target: /models
        read_only: true

volumes:
  lkjagent-data:
